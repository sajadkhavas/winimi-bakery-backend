<svg viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Star 1 big -->
  <g transform="translate(24,30)">
    <polygon points="0,-20 4,-6 18,-6 7,3 11,17 0,9 -11,17 -7,3 -18,-6 -4,-6" fill="url(#starGrad)"/>
  </g>
  <!-- Star 2 medium -->
  <g transform="translate(46,16)">
    <polygon points="0,-11 2.5,-3.5 10,-3.5 4,1.5 6,10 0,5.5 -6,10 -4,1.5 -10,-3.5 -2.5,-3.5" fill="#c084fc"/>
  </g>
  <!-- Star 3 small -->
  <g transform="translate(56,40)">
    <polygon points="0,-7 1.5,-2 7,-2 3,1 4.5,6.5 0,3.5 -4.5,6.5 -3,1 -7,-2 -1.5,-2" fill="#ddd6fe"/>
  </g>

  <!-- Shine -->
  <text x="72" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#7c3aed" letter-spacing="-0.5">Shine</text>
  <!-- Three -->
  <text x="72" y="50" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="300" fill="#a855f7" letter-spacing="1.5">Three</text>

  <!-- accent line -->
  <rect x="72" y="53" width="130" height="1" rx="0.5" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
