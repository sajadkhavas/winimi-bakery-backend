name: Backend CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "agent/**"
  pull_request:
    branches:
      - main

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_ENV: testing
  APP_DEBUG: "true"
  DB_CONNECTION: sqlite
  DB_DATABASE: database/database.sqlite
  CACHE_STORE: array
  SESSION_DRIVER: array
  QUEUE_CONNECTION: sync
  MAIL_MAILER: array
  TELESCOPE_ENABLED: "false"
  PULSE_ENABLED: "false"

jobs:
  validate:
    name: Audit, freeze, migrate, seed, cache, Filament and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, intl, mbstring, openssl, pdo_sqlite, sqlite3, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --no-check-publish --no-check-lock

      - name: Install Composer dependencies
        id: composer_install
        run: |
          set -o pipefail
          composer install --prefer-dist --no-interaction --no-progress 2>&1 | tee composer-install.log

      - name: Upload Composer install diagnostics
        if: failure() && steps.composer_install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: composer-install-diagnostics
          path: composer-install.log
          if-no-files-found: error
          retention-days: 3

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate --force
          php artisan optimize:clear

      - name: Backend foundation audit
        run: php scripts/audit-backend-foundation.php

      - name: Full launch roadmap audit
        run: composer audit:launch

      - name: Bakery catalog audit
        run: composer audit:catalog

      - name: Customer authentication audit
        run: composer audit:auth

      - name: Checkout and order audit
        run: composer audit:orders

      - name: Payment architecture audit
        run: composer audit:payments

      - name: Store operations audit
        id: store_audit
        run: |
          set -o pipefail
          composer audit:operations 2>&1 | tee store-operations-audit.log

      - name: Upload store operations diagnostics
        if: failure() && steps.store_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: store-operations-audit-diagnostics
          path: store-operations-audit.log
          if-no-files-found: error
          retention-days: 3

      - name: Backend contract freeze audit
        id: freeze_audit
        run: |
          set -o pipefail
          php scripts/audit-backend-freeze.php 2>&1 | tee backend-freeze-audit.log

      - name: Upload backend freeze diagnostics
        if: failure() && steps.freeze_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-freeze-audit-diagnostics
          path: backend-freeze-audit.log
          if-no-files-found: error
          retention-days: 3

      - name: Pint formatting is clean
        id: pint
        run: |
          set -o pipefail
          composer format:check 2>&1 | tee pint-existing.log
          php vendor/bin/pint --test \
            app/Support/ApiExceptionRenderer.php \
            app/Support/Pagination.php \
            app/Console/Commands/BackendReadiness.php \
            database/migrations/2026_07_20_120000_optimize_backend_contract_indexes.php \
            database/seeders/DatabaseSeeder.php \
            database/seeders/WinimiStagingSeeder.php \
            tests/Feature/BackendContractFreezeTest.php \
            tests/Feature/SystemApiTest.php \
            scripts/audit-backend-freeze.php 2>&1 | tee pint-freeze.log

      - name: Upload Pint diagnostics
        if: failure() && steps.pint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pint-diagnostics
          path: |
            pint-existing.log
            pint-freeze.log
          if-no-files-found: error
          retention-days: 3

      - name: Run database migrations and staging seed smoke
        id: migrations
        run: |
          set -o pipefail
          php artisan migrate:fresh --force 2>&1 | tee migrations.log
          php artisan db:seed --class='Database\Seeders\WinimiStagingSeeder' --force 2>&1 | tee staging-seed.log
          php artisan backend:readiness --json 2>&1 | tee backend-readiness-seeded.log
          php artisan migrate:fresh --force

      - name: Upload migration and seed diagnostics
        if: failure() && steps.migrations.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: migration-seed-diagnostics
          path: |
            migrations.log
            staging-seed.log
            backend-readiness-seeded.log
          if-no-files-found: warn
          retention-days: 3

      - name: Cache configuration
        id: config_cache
        run: |
          set -o pipefail
          php artisan config:cache 2>&1 | tee config-cache.log

      - name: Upload configuration cache diagnostics
        if: failure() && steps.config_cache.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: config-cache-diagnostics
          path: config-cache.log
          if-no-files-found: error
          retention-days: 3

      - name: Cache routes
        run: php artisan route:cache

      - name: Discover API and admin routes
        run: |
          php artisan route:list --except-vendor
          php artisan route:list --path=api/system/openapi
          php artisan route:list --path=api/auth
          php artisan route:list --path=api/checkout
          php artisan route:list --path=api/account/addresses
          php artisan route:list --path=api/account/orders
          php artisan route:list --path=api/delivery
          php artisan route:list --path=api/store
          php artisan route:list --path=api/inquiries
          php artisan route:list --path=api/orders
          php artisan route:list --path=api/payments
          php artisan route:list --path=admin/bakery
          php artisan route:list --path=admin/orders
          php artisan route:list --path=admin/payment-attempts
          php artisan route:list --path=admin/delivery-zones
          php artisan route:list --path=admin/store-settings
          php artisan route:list --path=admin/product-reviews
          php artisan route:list --path=admin/inquiries
          php artisan route:list --path=admin/notification

      - name: Validate commands and backend readiness
        run: |
          php artisan list --raw | grep '^inventory:release-expired'
          php artisan list --raw | grep '^notifications:dispatch'
          php artisan list --raw | grep '^backend:readiness'
          php artisan backend:readiness --json

      - name: Validate Filament discovery and clear caches
        run: |
          if php artisan list --raw | grep -q '^filament:cache-components'; then
            php artisan filament:cache-components
            php artisan filament:clear-cached-components
          fi
          php artisan optimize:clear

      - name: Run tests
        id: tests
        run: |
          set -o pipefail
          php artisan test 2>&1 | tee tests.log

      - name: Upload test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Composer security audit
        id: security_audit
        run: |
          set -o pipefail
          composer audit --no-interaction 2>&1 | tee composer-audit.log

      - name: Upload Composer security diagnostics
        if: failure() && steps.security_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit-diagnostics
          path: composer-audit.log
          if-no-files-found: error
          retention-days: 3
