name: Backend CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_ENV: testing
  APP_DEBUG: "true"
  DB_CONNECTION: sqlite
  DB_DATABASE: database/database.sqlite
  CACHE_STORE: array
  SESSION_DRIVER: array
  QUEUE_CONNECTION: sync
  MAIL_MAILER: array
  TELESCOPE_ENABLED: "false"
  PULSE_ENABLED: "false"

jobs:
  validate:
    name: Audit, format, migrate, route cache and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, intl, mbstring, openssl, pdo_sqlite, sqlite3, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --no-check-publish --no-check-lock

      - name: Install Composer dependencies
        id: composer_install
        run: |
          set -o pipefail
          composer install --prefer-dist --no-interaction --no-progress 2>&1 | tee composer-install.log

      - name: Upload Composer install diagnostics
        if: failure() && steps.composer_install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: composer-install-diagnostics
          path: composer-install.log
          if-no-files-found: error
          retention-days: 3

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate --force
          php artisan optimize:clear

      - name: Backend foundation audit
        run: php scripts/audit-backend-foundation.php

      - name: Pint formatting
        run: vendor/bin/pint --test

      - name: Run database migrations
        run: php artisan migrate:fresh --force

      - name: Validate cached configuration and routes
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan route:list --except-vendor
          php artisan optimize:clear

      - name: Run tests
        run: php artisan test

      - name: Composer security audit
        run: composer audit --no-interaction
