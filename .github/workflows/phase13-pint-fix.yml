name: Phase 13 Pint Fix

on:
  push:
    branches:
      - feature/phase-13-checkout-orders-inventory

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/phase-13-checkout-orders-inventory

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Format audit
        run: vendor/bin/pint scripts/audit-orders-checkout.php

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/audit-orders-checkout.php
          git commit -m "Format Phase 13 order audit"
          git push
