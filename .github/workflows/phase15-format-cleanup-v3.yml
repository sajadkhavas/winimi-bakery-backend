name: Phase 15 Deterministic Cleanup

on:
  push:
    branches:
      - agent/phase-15-store-operations

permissions:
  contents: write

concurrency:
  group: phase15-format-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-15-store-operations
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Apply canonical Pint formatting
        run: |
          command="$(php -r '$composer = json_decode(file_get_contents("composer.json"), true, 512, JSON_THROW_ON_ERROR); echo str_replace(["@php ", " --test "], ["php ", " "], $composer["scripts"]["format:check"][0]);')"
          eval "$command"

      - name: Write strict backend CI
        run: |
          cat > .github/workflows/backend-ci.yml <<'YAML'
          name: Backend CI

          on:
            push:
              branches:
                - main
                - "feature/**"
                - "agent/**"
            pull_request:
              branches:
                - main

          concurrency:
            group: backend-ci-${{ github.ref }}
            cancel-in-progress: true

          permissions:
            contents: read

          env:
            APP_ENV: testing
            APP_DEBUG: "true"
            DB_CONNECTION: sqlite
            DB_DATABASE: database/database.sqlite
            CACHE_STORE: array
            SESSION_DRIVER: array
            QUEUE_CONNECTION: sync
            MAIL_MAILER: array
            TELESCOPE_ENABLED: "false"
            PULSE_ENABLED: "false"

          jobs:
            validate:
              name: Audit, catalog, auth, orders, payments, operations, migrate, Filament and test
              runs-on: ubuntu-latest
              timeout-minutes: 25

              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Set up PHP
                  uses: shivammathur/setup-php@v2
                  with:
                    php-version: "8.3"
                    extensions: bcmath, ctype, curl, dom, fileinfo, gd, intl, mbstring, openssl, pdo_sqlite, sqlite3, tokenizer, xml, zip
                    coverage: none
                    tools: composer:v2

                - name: Validate Composer metadata
                  run: composer validate --no-check-publish --no-check-lock

                - name: Install Composer dependencies
                  id: composer_install
                  run: |
                    set -o pipefail
                    composer install --prefer-dist --no-interaction --no-progress 2>&1 | tee composer-install.log

                - name: Upload Composer install diagnostics
                  if: failure() && steps.composer_install.outcome == 'failure'
                  uses: actions/upload-artifact@v4
                  with:
                    name: composer-install-diagnostics
                    path: composer-install.log
                    if-no-files-found: error
                    retention-days: 3

                - name: Prepare Laravel environment
                  run: |
                    cp .env.example .env
                    mkdir -p database
                    touch database/database.sqlite
                    php artisan key:generate --force
                    php artisan optimize:clear

                - name: Backend foundation audit
                  run: php scripts/audit-backend-foundation.php

                - name: Full-launch roadmap audit
                  run: composer audit:launch

                - name: Bakery catalog audit
                  run: composer audit:catalog

                - name: Customer authentication audit
                  run: composer audit:auth

                - name: Checkout and order audit
                  run: composer audit:orders

                - name: Payment architecture audit
                  run: composer audit:payments

                - name: Store operations audit
                  id: operations_audit
                  run: |
                    set -o pipefail
                    composer audit:operations 2>&1 | tee operations-audit.log

                - name: Upload store operations audit diagnostics
                  if: failure() && steps.operations_audit.outcome == 'failure'
                  uses: actions/upload-artifact@v4
                  with:
                    name: store-operations-audit-diagnostics
                    path: operations-audit.log
                    if-no-files-found: error
                    retention-days: 3

                - name: Pint formatting
                  id: pint
                  run: |
                    set -o pipefail
                    composer format:check 2>&1 | tee pint.log

                - name: Upload Pint diagnostics
                  if: failure() && steps.pint.outcome == 'failure'
                  uses: actions/upload-artifact@v4
                  with:
                    name: pint-diagnostics
                    path: pint.log
                    if-no-files-found: error
                    retention-days: 3

                - name: Run database migrations
                  id: migrations
                  run: |
                    set -o pipefail
                    php artisan migrate:fresh --force 2>&1 | tee migrations.log

                - name: Upload migration diagnostics
                  if: failure() && steps.migrations.outcome == 'failure'
                  uses: actions/upload-artifact@v4
                  with:
                    name: migration-diagnostics
                    path: migrations.log
                    if-no-files-found: error
                    retention-days: 3

                - name: Validate cached configuration, routes, commands and Filament discovery
                  run: |
                    php artisan config:cache
                    php artisan route:cache
                    php artisan route:list --except-vendor
                    php artisan route:list --path=api/auth
                    php artisan route:list --path=api/checkout
                    php artisan route:list --path=api/account/addresses
                    php artisan route:list --path=api/account/orders
                    php artisan route:list --path=api/delivery
                    php artisan route:list --path=api/store
                    php artisan route:list --path=api/inquiries
                    php artisan route:list --path=api/orders
                    php artisan route:list --path=api/payments
                    php artisan route:list --path=admin/bakery
                    php artisan route:list --path=admin/orders
                    php artisan route:list --path=admin/payment-attempts
                    php artisan route:list --path=admin/delivery-zones
                    php artisan route:list --path=admin/store-settings
                    php artisan route:list --path=admin/product-reviews
                    php artisan route:list --path=admin/inquiries
                    php artisan route:list --path=admin/notification
                    php artisan list --raw | grep '^inventory:release-expired'
                    php artisan list --raw | grep '^notifications:dispatch'
                    if php artisan list --raw | grep -q '^filament:cache-components'; then
                      timeout 120 php artisan filament:cache-components
                      php artisan filament:clear-cached-components
                    fi
                    php artisan optimize:clear

                - name: Run tests
                  id: tests
                  run: |
                    set -o pipefail
                    php artisan test 2>&1 | tee tests.log

                - name: Upload test diagnostics
                  if: failure() && steps.tests.outcome == 'failure'
                  uses: actions/upload-artifact@v4
                  with:
                    name: test-diagnostics
                    path: tests.log
                    if-no-files-found: error
                    retention-days: 3

                - name: Composer security audit
                  id: security_audit
                  run: |
                    set -o pipefail
                    composer audit --no-interaction 2>&1 | tee composer-audit.log

                - name: Upload Composer security diagnostics
                  if: failure() && steps.security_audit.outcome == 'failure'
                  uses: actions/upload-artifact@v4
                  with:
                    name: composer-audit-diagnostics
                    path: composer-audit.log
                    if-no-files-found: error
                    retention-days: 3
          YAML

      - name: Remove temporary workflows
        run: |
          rm -f .github/workflows/phase15-format-commit.yml
          rm -f .github/workflows/phase15-format-cleanup.yml
          rm -f .github/workflows/phase15-format-cleanup-v2.yml
          rm -f .github/workflows/phase15-format-cleanup-v3.yml

      - name: Commit final state
        run: |
          if git diff --quiet; then
            echo "No finalization changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 15N: finalize canonical formatting and strict CI"
          git push origin HEAD:agent/phase-15-store-operations
