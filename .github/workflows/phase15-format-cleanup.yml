name: Phase 15 Format Cleanup

on:
  push:
    branches:
      - agent/phase-15-store-operations

permissions:
  contents: write

concurrency:
  group: phase15-format-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-15-store-operations
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Apply canonical Pint formatting
        run: |
          command="$(php -r '$composer = json_decode(file_get_contents("composer.json"), true, 512, JSON_THROW_ON_ERROR); echo str_replace(["@php ", " --test "], ["php ", " "], $composer["scripts"]["format:check"][0]);')"
          eval "$command"

      - name: Restore strict CI and remove temporary workflows
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/backend-ci.yml')
          text = path.read_text()
          temporary = '''      - name: Apply canonical Pint formatting
                id: pint
                run: |
                  set -o pipefail
                  command="$(php -r '$composer = json_decode(file_get_contents("composer.json"), true, 512, JSON_THROW_ON_ERROR); echo str_replace(["@php ", " --test "], ["php ", " "], $composer["scripts"]["format:check"][0]);')"
                  eval "$command" 2>&1 | tee pint.log
                  git diff --name-only -z -- '*.php' | tar --null -T - -czf pint-formatted-files.tar.gz

              - name: Upload canonical Pint files
                uses: actions/upload-artifact@v4
                with:
                  name: pint-formatted-files
                  path: pint-formatted-files.tar.gz
                  if-no-files-found: error
                  retention-days: 3
          '''
          strict = '''      - name: Pint formatting
                id: pint
                run: |
                  set -o pipefail
                  composer format:check 2>&1 | tee pint.log

              - name: Upload Pint diagnostics
                if: failure() && steps.pint.outcome == 'failure'
                uses: actions/upload-artifact@v4
                with:
                  name: pint-diagnostics
                  path: pint.log
                  if-no-files-found: error
                  retention-days: 3
          '''
          if temporary not in text:
              raise SystemExit('Temporary Pint block was not found in backend CI.')
          path.write_text(text.replace(temporary, strict))
          PY
          rm -f .github/workflows/phase15-format-commit.yml
          rm -f .github/workflows/phase15-format-cleanup.yml

      - name: Commit final formatting state
        run: |
          if git diff --quiet; then
            echo "No cleanup changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 15N: finalize canonical formatting and strict CI"
          git push origin HEAD:agent/phase-15-store-operations
