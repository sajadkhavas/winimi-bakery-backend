name: Phase 12 Pint Fix

on:
  push:
    branches:
      - feature/phase-12-otp-customer-account

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/phase-12-otp-customer-account

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, intl, mbstring, openssl, pdo_sqlite, sqlite3, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Apply Pint to Phase 12 files
        run: |
          vendor/bin/pint \
            app/Support/IranianMobile.php \
            app/Exceptions/OtpCooldown.php \
            app/Exceptions/OtpDeliveryUnavailable.php \
            app/Services/Auth \
            app/Http/Controllers/Api/OtpAuthController.php \
            app/Http/Controllers/Api/AccountController.php \
            app/Http/Resources/CustomerResource.php \
            app/Models/Customer.php \
            app/Models/OtpChallenge.php \
            app/Filament/Resources/CustomerResource.php \
            app/Filament/Resources/CustomerResource \
            app/Providers/AppServiceProvider.php \
            config/auth.php \
            config/sanctum.php \
            config/winimi.php \
            routes/api.php \
            routes/console.php \
            database/migrations/2026_07_19_163000_create_customer_auth_tables.php \
            tests/Feature/CustomerOtpAuthTest.php \
            tests/Feature/SystemApiTest.php \
            tests/Unit/BackendFoundationTest.php \
            scripts/audit-customer-auth.php

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app config routes database/migrations/2026_07_19_163000_create_customer_auth_tables.php tests scripts/audit-customer-auth.php
          git commit -m "style: format phase 12 customer authentication"
          git push origin HEAD:feature/phase-12-otp-customer-account
